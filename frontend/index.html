<!DOCTYPE html>
<html>
<head>
    <title>Cloud Posture Dashboard</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>🛡️ Cloud Posture Scanner</h1>
    
    <h2>EC2 Instances</h2>
    <table id="instances">
        <thead>
            <tr>
                <th>Instance ID</th>
                <th>Type</th>
                <th>Region</th>
                <th>Public IP</th>
                <th>Security Groups</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <h2>S3 Buckets</h2>
    <table id="buckets">
        <thead>
            <tr>
                <th>Bucket Name</th>
                <th>Region</th>
                <th>Encryption</th>
                <th>Access Policy</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <h2>CIS Security Results</h2>
    <div id="cis"></div>

    <script src="script.js"></script>
</body>
</html>
